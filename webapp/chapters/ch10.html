# 第 10 章　融合核心、Flash Attention 與混合精度（Fused Kernels, Flash Attention & Mixed Precision）

> 譯自 Hugging Face nanotron 團隊《The Ultra-Scale Playbook: Training LLMs on GPU Clusters》（Apache 2.0），原文為 [Hugging Face Space](https://huggingface.co/spaces/nanotron/ultrascale-playbook)。本章為原書「Diving in the GPUs」後半。

## 融合核心（Fused Kernels）

我們已經在許多地方提過，GPU 與 CPU 的運算可以是非同步的。特別是，CPU 上的主機（host）程式碼可以用非阻塞（non-blocking）的方式，把工作負載排程到 GPU 上。

非阻塞對於重疊通訊與計算非常有用——這一路上我們已經見識過許多次——但它還可以延伸成一個更一般性的想法：不惜一切代價，避免在主機與 GPU 核心（kernel）指令之間來回奔波。

[Horace He](https://horace.io/brrr_intro.html) 在下面這幾張圖中，把這個想法詮釋得淋漓盡致：

![一連串核心在全域記憶體與計算單元之間來回搬移](../webapp/assets/images/fused_kernels1.png)

*一連串核心的執行，需要在全域記憶體與計算單元之間來回搬移資料*

![融合核心一次完成所有運算](../webapp/assets/images/fused_kernels2.png)

*與其把三角形送回全域記憶體、之後又再讀回來，我們乾脆一口氣完成所有運算*

要怎麼避免這種來回搬移呢？最好的辦法就是讓 GPU 盡可能自主運作。具體作法是把盡可能多的連續計算操作打包進單一核心，交給 GPU 執行，這就是所謂的「融合核心」（fused kernel）。

對於在每個輸入 token 上彼此獨立執行的一連串逐點（point-like）運算來說，融合核心特別有效率，寫起來也特別簡單。在這種情況下，把算好的值先送回全域記憶體、再搬進 SM 記憶體並啟動新的核心，是毫無意義的；把所有值留在本地，直到一整串計算全部完成，效率會高得多。

在 Transformer 模型裡，有許多地方都能套用這種核心融合（kernel fusion）手法：只要遇到一連串的逐點運算就行，例如層正規化（layer norm）所涉及的計算。

到這裡，我們已經具備了所有必要的知識，可以好好欣賞一件核心工程的曠世傑作：**Flash Attention**。

## Flash Attention 1-3

Flash Attention 由 [Tri Dao](https://tridao.me) 提出，透過撰寫客製化 CUDA 核心來最佳化注意力計算，讓它更快*而且*更節省記憶體。Flash Attention 背後的想法，是有效利用 GPU 的各種記憶體，避免過度依賴其中最慢的一種：GPU 的全域記憶體。

> 📝 **註**：GPU 的全域記憶體有個容易讓人混淆的名字——「高頻寬記憶體」（High Bandwidth Memory, HBM）🫠

注意力機制的基本實作需要在記憶體與工作單元之間大量搬移資料。它必須把 $S$ 矩陣與 $P$ 矩陣具現化（materialize）到 HBM 中，也就是說，計算結果得先送到 HBM，再送回 SRAM 進行後續計算：

![樸素注意力實作在 HBM 與 SRAM 之間的資料搬移](../webapp/assets/images/flashattn.png)

由於 HBM 的頻寬低得多，這在注意力計算中造成了嚴重的瓶頸。我們能做得更好嗎？Tri Dao 說：可以！

關鍵在於把 $S$ 矩陣切成小塊來計算，讓每一小塊都能放進 SM 上較小的共享記憶體。但我們還能更進一步：完全避免具現化那個非常龐大的 $S$ 矩陣，只保留計算 softmax 正規化因子所需的統計量。如此一來，我們可以直接在 SRAM 中一次算出 $O$ 的一部分，而不必來回搬移中間結果。這麼做不僅善用了共享記憶體，也解除了一個記憶體瓶頸——這個瓶頸來自於具現化模型中（在長上下文長度下）最大的激活矩陣之一：注意力矩陣。

![Flash Attention 分塊計算示意圖](../webapp/assets/images/flashattn2.png)

*圖片來源：FlashAttention 論文*

Flash Attention 的想法解決了模型訓練中如此多的瓶頸，因此它迅速成為所有 transformer 執行注意力的預設方式：

* 藉由避免具現化 $S$ 矩陣，我們**減輕了注意力的記憶體負擔**
* 我們也**大幅消除了注意力 $O(S^2)$ 成本在樸素實作下的影響**

也因此，各種線性注意力（linear attention）變體，以及以次二次方（sub-quadratic）複雜度近似注意力的方法——這些都是在 transformer 架構發明後不久發展出來的——大多已被擱置一旁，取而代之的是這個既精確又快速的 Flash Attention 實作與機制。

繼 Flash Attention 1 之後，同一個實驗室又陸續發表了兩個改進版本：Flash Attention 2 與 3。與 Flash Attention 1 相比，Flash Attention 2 與 3 的改進重點不在一般性的注意力機制，而是把它的低階實作更貼合 GPU 來量身打造：(1) 盡可能減少非矩陣乘法（non-matmul）運算；(2) 在 warp 與執行緒區塊（thread block）之間精心分配工作負載（Flash Attention 2）；以及針對最新 Hopper（H100）架構的 FP8 與 Tensor Core 支援仔細地最佳化（Flash Attention 3）。

> 📝 **註**：Flash Attention 對哪些注意力模式能被加速有一些限制。可以看看 [FlexAttention](https://pytorch.org/blog/flexattention/)，它是一個既快速*又*有彈性的變體。

Flash Attention 是一場大師級的示範，展示了只要把當前 GPU 加速器內部的記憶體／計算設計納入考量，就可能帶來何等突破性的改進。

---

到目前為止，本節（運算融合）所描述的技術，都需要我們修改建模程式碼，並為特定運算撰寫客製化核心，才能加速訓練。

在這趟深入計算操作本身的低階之旅的最後一節，我們要來看一系列與建模程式碼無關的方法。這些方法適用於任何模型，而且使用得如此廣泛，已然成為業界標準：**混合精度訓練（Mixed Precision Training）**！

## 混合精度訓練（Mixed Precision Training）

在本書的多個章節裡，我們談過各種低精度格式，以及它們對儲存激活值、參數與優化器狀態所需記憶體的影響。現在是時候深入這些格式的細節，更透徹地理解它們的取捨、優點與限制了。

混合精度訓練，顧名思義，就是在訓練時混合使用不同的精度。PyTorch 張量的預設數值精度是單精度浮點數格式（single-precision floating point format），也稱為 FP32 或 float32，意思是每個儲存的數字佔 32 位元，也就是 4 個位元組。用來表示一個數字的位元被分成三個部分：

* 符號（sign）：第一個位元，決定數字是正還是負
* 尾數（mantissa）：決定數字的有效位數
* 指數（exponent）：控制數字的數量級

![浮點數的符號、尾數與指數位元配置](../webapp/assets/images/sign-mantissa-exponent.svg)

浮點數的原理可以用數字的科學記號來輕鬆說明，例如 $-5.734 \times 10^{7}$：最前面是符號，接著是尾數與指數。如此一來，我們就能以自適應的精度，表示橫跨廣大數量級範圍的數字。雖然 float32 是預設值，PyTorch 中還有一系列可用的浮點格式：

| **格式** | **總位元數** | **符號** | **指數** | **尾數** |
|---|---|---|---|---|
| float32 | 32 | 1 | 8 | 23 |
| float16 | 16 | 1 | 5 | 10 |
| bfloat16 | 16 | 1 | 8 | 7 |
| float8 (e4m3) | 8 | 1 | 4 | 3 |
| float8 (e5m2) | 8 | 1 | 5 | 2 |

> 📝 **註**：你可能會好奇 bfloat16 裡的「b」是哪來的。這個格式是在 Google Brain 開發出來的，所以「b」代表的是「brain」。

減少總位元數是要付出代價的（這裡同樣沒有白吃的午餐），但我們對於怎麼付這個代價有一些掌控權：可以多犧牲一些尾數的位元，也可以多犧牲一些指數的位元。正因如此，float8 才存在兩種以指數與尾數命名的格式，讓我們能彈性選擇最合適的一種。我們可以看看每種格式所能表示的數值範圍：

![各浮點格式可表示的數值範圍](../webapp/assets/images/mixedprecision.png)

可以看到，float32 橫跨了 80 個數量級；float16 犧牲了大量的範圍，而 bfloat16 則保有完整的範圍。兩種 float8 格式把範圍縮得更小：e5m2 還能維持 float16 的範圍，e4m3 的範圍則更小。

為什麼有些格式能維持範圍，有些卻不行？讓我們透過解析度來一探究竟：在 1 到 2 之間取 10,000 個點，並把每個點四捨五入到各格式中最接近的可表示數字：

![各浮點格式在 1 到 2 區間的解析度比較](../webapp/assets/images/mixedprecision_2.png)

從這裡可以看到，bfloat16 雖然維持了 float32 的範圍（優於 float16），卻是以犧牲更多精度為代價。至於 float8，情況更加嚴峻：在 1 到 2 的區間裡，e4m3 只能表示 7 個數字，e5m2 更只有 3 個。

衡量一種格式解析度的常見指標是 epsilon：也就是 $1.00$ 之後第一個可表示的數字。對 float32 格式而言，$10^{-4}$ 是一個上界（實際值是 $1.19 \times 10^{-7}$）；float16 大約是 $10^{-3}$，而 bfloat16 又比它高 10 倍。

混合精度訓練的想法，就是在維持全精度訓練效果的同時，改用其中一些較低精度的格式。

事實證明，我們**不能**完全拋棄 float32，通常仍需要讓某些部分維持在全精度。這也是為什麼低精度訓練通常被稱為**混合精度**訓練。

現在，讓我們先看看如何用 16 位元訓練模型，再看看能不能更進一步，一路降到 8 位元。

### FP16 與 BF16 訓練

很遺憾，天真地把所有張量與運算都換成 float16 是行不通的，結果通常是損失發散。不過，最初的混合精度訓練論文想出了三個技巧，來追平 float32 訓練的表現：

1. **FP32 權重副本**：float16 權重有兩個可能的問題。訓練過程中，有些權重可能變得非常小，以致被捨入為 0。然而，即使權重本身離零不算近，只要更新量非常小，兩者數量級的差距也可能導致權重在加法過程中發生下溢（underflow）。權重一旦變成 0，由於再也沒有梯度訊號傳過來，它在之後的訓練中就會一直維持是 0。
2. **損失縮放（loss scaling）**：梯度也有類似的問題，因為梯度往往遠小於 1，因此有下溢的風險。一個簡單卻有效的策略是：在反向傳播之前先縮放損失，並在反向傳播之後把梯度的縮放還原（unscale）。這確保了反向傳播過程中不會發生下溢；而由於我們會在進一步處理梯度（例如裁剪）與執行優化步驟之前先還原縮放，這個縮放並不會影響訓練。
3. **累加（accumulation）**：最後，以 16 位元精度執行某些算術運算（例如取平均或加總）時，同樣可能遇到下溢或上溢（overflow）。解法是在運算過程中以 float32 累加中間結果，只在最後才把結果轉回 16 位元精度。

有了這些技巧，我們就能獲得穩定的訓練，同時受惠於更快的低精度算術運算所帶來的更高吞吐量。身為一位好奇的讀者——而且讀到這裡，大概已經對榨取吞吐量有點上癮了——你自然會問：我們能比 16 位元精度走得更遠、更快嗎？

也許可以！

### FP8 預訓練

即使我們把通訊與計算重疊得天衣無縫，最終還是會撞上硬體本身低階的理論 FLOPS 上限，也就是硬體上每一個個別運算的效率。這正是數值精度變得至關重要的地方。舉例來說，在 NVIDIA 的 H100 GPU 上，FP8 矩陣乘法（GEMM 運算）的理論 FLOPS 是 bfloat16 的兩倍，這使得低精度訓練成為進一步最佳化的一條誘人途徑。

近期的研究——包括 FP8-LM、torchao 與 DeepSeek-V3——已經展示了 FP8 訓練在大規模模型上的潛力。儘管如此，FP8 預訓練仍帶來一個重大挑戰：穩定性。在較低的精度下，數值不穩定常常導致損失發散，難以追平較高精度訓練的準確度。

我們知道，在模型大小固定的情況下，不穩定性會隨著學習率提高而增加，這讓 FP8 預訓練格外棘手。

以下是 FP8 訓練典型發散損失曲線的一個例子：

![FP8 訓練的發散損失曲線](../webapp/assets/images/fp8_training_loss_curves.svg)

> 🔬 原文此處為互動圖表（可縮放檢視不同 FP8 訓練設定下損失曲線的發散情形），可至[原網頁](https://huggingface.co/spaces/nanotron/ultrascale-playbook)體驗。

第一個公開報告以 FP8 混合精度成功完成超大規模訓練的，是 DeepSeek-V3。作者仔細分析了前向傳播（Fprop）的每一個運算，以及反向傳播中的激活值梯度（Dgrad）與權重梯度（Wgrad）運算。與 BF16 混合精度訓練類似，部分聚合運算與主權重（master weights）以較高精度保存，而運算本身則以 FP8 執行。

![DeepSeek-V3 的 FP8 混合精度訓練流程圖](../webapp/assets/images/fp8_diagram.png)

為了從高精度（例如 FP32 或 BF16）切換到範圍較小的低精度（例如 FP16 或 FP8），我們需要對激活值的範圍做正規化，例如計算它們的絕對最大值。DeepSeek-V3 進一步引入了一種特定的量化方案：以小區塊（tile）為單位對範圍做正規化——輸入／激活值採 $1 \times 128$、權重與縮放元素採 $128 \times 128$。這讓正規化比較不會受到激活值中離群值的強烈影響。他們還提出了許多能進一步降低記憶體與通訊開銷的技巧，你可以在 DeepSeek-V3 技術報告的 3.3 節中繼續深入。

以下彙整幾種已知的 FP8 訓練作法：

| 方案 | GEMM 精度 | 主模型權重 | 累積梯度 | 模型權重 | 梯度 | 優化器狀態 | 總記憶體 |
|---|---|---|---|---|---|---|---|
| bfloat16 搭配 fp32 的混合精度基準 | bf16 | fp32 | fp32 | bf16 | bf16 | fp32 + fp32 | 4 + 4 + 2 + 2 + 4 + 4 = 20 位元組 |
| 同上，但不做 FP32 梯度累積 | bf16 | fp32 | n/a | bf16 | bf16 | fp32 + fp32 | 4 + 2 + 2 + 4 + 4 = 16 位元組 |
| Transformer Engine | fp8 | n/a | n/a | fp32 | fp32 | fp32 + fp32 | 4 + 4 + 4 + 4 = 16 位元組（減少 20%） |
| FP8-LM 的 O3 等級 | fp8 | fp16 | fp16 | fp8 | fp8 | fp8 + fp16 | 2 + 2 + 1 + 1 + 1 + 2 = 9 位元組（減少 55%） |
| DeepSeek-V3 | fp8 | fp32 | fp32 | fp8 | bf16 | bf16 + bf16 | 4 + 4 + 1 + 2 + 2 + 2 = 15（減少 25%） |
| nanotron 的 FP8 | fp8 | bf16 | fp32 | fp8 | fp8 | fp8 + fp8 | 2 + 4 + 1 + 1 + 1 + 1 = 10 位元組（減少 50%） |

整體而言，FP8（在 2025 年初）仍是一項實驗性技術，各種方法仍在持續演進。鑑於它顯而易見的好處，它很可能成為標準，並在不久之後取代 bf16 混合精度。想追蹤 FP8 訓練技術的開源實作，請前往 nanotron 在[這個 PR](https://github.com/huggingface/nanotron/pull/70) 中的實作。

再往更遠的未來看，NVIDIA 的下一代晶片 Blackwell [已經宣布](https://www.nvidia.com/en-us/data-center/technologies/blackwell-architecture/)將支援 FP4 訓練，能進一步加速訓練，但毫無疑問，也會帶來新的訓練穩定性挑戰。

---

這最後一節，為我們在數十到數千張 GPU 上進行快速大型模型訓練的漫長旅程畫下了句點。是時候讓我們的 GPU 叢集慢慢歇息，並退後一步，總結這一路走來學到的一切了。
