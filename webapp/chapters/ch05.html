# 第 5 章　管線平行（Pipeline Parallelism）

> 譯自 Hugging Face nanotron 團隊《The Ultra-Scale Playbook: Training LLMs on GPU Clusters》（Apache 2.0），原文為 [Hugging Face Space](https://huggingface.co/spaces/nanotron/ultrascale-playbook)。

> 🎧 原文此處附有由 NotebookLM 主持人討論本書後續章節的 podcast 音訊，想為閱讀增添一點 podcast 氣氛的讀者，可至[原網頁](https://huggingface.co/spaces/nanotron/ultrascale-playbook)邊讀邊聽。

在〈張量平行〉一節中我們看到，若試圖將張量平行（tensor parallelism, TP）擴展到超過單一節點的 GPU 數量（通常是 4 或 8 顆），就會撞上頻寬較低的「節點間連線」（inter-node connection）網路，可能相當嚴重地拖累效能。當我們在叢集上跨多個節點（每個節點有 8 顆 GPU）對 all-reduce 操作做基準測試時，就能清楚看到這一點：

> 🔬 原文此處為互動圖表（跨節點集合通訊操作的頻寬基準測試），可至[原網頁](https://huggingface.co/spaces/nanotron/ultrascale-playbook)體驗；下圖為靜態版本。

![跨節點通訊頻寬量測](../webapp/assets/images/pp_comm_bandwidth.svg)
*跨不同節點數的節點間通訊頻寬量測結果，顯示 AllReduce、AllGather 與 ReduceScatter 操作的中位數（實線）與第 5 至 95 百分位範圍（陰影區域）。*

序列平行與上下文平行對長序列有幫助，但如果我們記憶體問題的根源並非序列長度，而是模型本身的大小，這兩種方法就幫不上什麼忙了。對於大型模型（70B 參數以上），光是權重的大小就可能超出單一節點上 4 到 8 顆 GPU 的極限。這時我們可以召喚第四個（也是最後一個）平行化維度：「管線平行」（pipeline parallelism, PP）。

管線平行是一種簡單卻強大的技術——我們把模型的層切分到多顆 GPU 上！舉例來說，如果有 8 顆 GPU，可以把第 1–4 層放在 GPU 1、第 5–8 層放在 GPU 2，依此類推。這樣一來，每顆 GPU 只需要儲存並處理模型的一部分層，大幅降低單顆 GPU 的記憶體需求。讓我們實際看看管線平行對一個 8B 模型記憶體用量的影響：

> 📝 **註**：這項技術可能會讓你想起我們在 ZeRO-3 的討論，當時我們把模型參數切分到多顆 GPU 上。我們會在稍後的〈5D 平行化總覽〉一節詳細比較這兩種技術。

> 🔬 原文此處為互動圖表（8B 模型在不同管線平行度下的記憶體用量），可至[原網頁](https://huggingface.co/spaces/nanotron/ultrascale-playbook)體驗；下圖為靜態版本。

![8B 模型在管線平行下的記憶體用量](../webapp/assets/images/pp_memoryusage.svg)

觀察上圖可以發現一件有趣的事：雖然模型參數確實漂亮地切分到了各顆 GPU 上，每顆 GPU 上的激活值（activation）記憶體卻維持不變！這是因為每顆 GPU 仍然需要處理完整批次的資料，只是負責的層不同。一顆 GPU 上各層產生的激活值會被送往下一顆 GPU，讓前向傳播得以繼續。

這引入了一種新的通訊模式：不同於資料平行中 ZeRO-3 傳遞的是參數，我們現在是在一條「管線」中於 GPU 之間循序傳遞激活值張量。概念上雖然簡單，要有效率地實作這項技術卻相當棘手。讓我們直接深入細節！

## 將模型層切分到多個節點——全前向、全後向

假設我們就單純地把模型層分散到多個裝置上，例如第一顆 GPU 拿前面幾層、第二顆 GPU 拿模型的第二段，依此類推。這時模型的前向傳播就變成：讓一批資料沿著模型依序前進，於是接連用到每一個運算裝置。

我們馬上得到第一個直接的好處：所需的互連頻寬相當低，因為我們只在模型深度方向上的少數幾個位置傳送中等大小的激活值。相較之下，張量平行的通訊在每一層內部都會發生好幾次，兩者可能有天壤之別。

但也許你已經隱約嗅到麻煩的氣息了：「依序」和「接連」？！在平行運算的世界裡，這聽起來可不太有效率，尤其是在我們討論過計算與通訊重疊之後。

沒錯，讀者！管線平行的主要挑戰，就在於如何有效繞過 PP 的循序本質，讓 GPU 隨時保持忙碌，避免一顆 GPU 在計算、其他 GPU 卻在枯等。以下是我們以最天真、最簡單的方式對模型執行一次前向與反向傳播時，GPU 使用率的樣貌（圖中數字代表模型的層編號）：

![天真管線平行的排程](../webapp/assets/images/pp_afab.svg)
*管線平行的範例：一個 16 層的模型分散在 4 顆 GPU 上，數字對應層的編號。*

圖中以灰色標示的是剩餘的閒置時間，通常稱為「氣泡」（bubble）。在我們花了這麼多時間優化吞吐量之後，看到這幅景象大概會讓你心碎。

我們可以透過計算因氣泡而損失的時間，來量化一組管線配置的效率。令 $t_f$ 與 $t_b$ 分別為單一微批次（micro-batch）在管線單一階段（stage）上量測到的前向與反向傳播時間（一個常見的簡化假設是 $t_b \approx 2 \times t_f$，上圖便是如此）。如果能完美平行化，理想總時間會是 $t_{id}=t_f + t_b$。然而從圖上可以數出來，由於管線氣泡（pipeline bubble）的存在，多出了 $t_{pb}=(p-1)*(t_f+t_b)$ 的額外時間（其中 $p$ 是管線平行度，也就是上圖中的 GPU 數量），這正是每顆 GPU 在其他 GPU 計算時所枯等的時間。

我們可以計算額外氣泡時間相對於理想時間的比例：

$$
r_{bubble} = \frac{(p-1)*(t_f+t_b)}{t_f+t_b} = p-1
$$

隨著管線階段增加，氣泡時間跟著增加，使用率也隨之下降。可見在天真的實作中，氣泡可能非常龐大！

幸好，人們已經設計出各式各樣的管線平行方案來**縮小氣泡**。

讓我們從工具箱裡拿出第一件工具：把批次切成更小、可以（幾乎）平行處理的小份資料，就像我們先前在資料平行中做的那樣。這樣一來，當第二顆 GPU 忙著處理微批次 1 時，第一顆 GPU 就已經可以開始處理微批次 2 了。以下是使用 8 個微批次的排程：

![AFAB 排程](../webapp/assets/images/pp_afab2.svg)

> 📝 **註**：先前圖中的數字代表的是層編號，但從本圖起，所有管線平行示意圖中的數字代表的都是微批次編號。你可以把這裡的每個方格想成包含前一張圖中的好幾層。

上面這種排程稱為**全前向全後向（all-forward-all-backward, AFAB）**排程，因為我們先做完所有前向傳播，然後才做所有反向傳播。它的優點是前向與反向步驟大體上仍是循序的，因此保留了模型訓練程式碼的整體結構，這使它成為最容易實作的 PP 方案之一。

你可以在 Picotron 中找到 AFAB 管線的完整實作：

> 👉 [Picotron 中的 AFAB PP 實作](https://github.com/huggingface/picotron/blob/0035cce0e04afd6192763b11efe50010d8ad0f71/picotron/pipeline_parallel/pipeline_parallel.py#L54-L83)（原文此處為可展開的程式碼區塊）

讓我們估算這個例子中的氣泡。與第一個例子的差別在於，處理 $m$ 個微批次的理想時間現在是 $t_{id} = m*(t_f+t_b)$：

$$
r_{bubble} = \frac{(p-1)*(t_f+t_b)}{m*(t_f+t_b)} = \frac{p-1}{m}
$$

可以看到，增加微批次數量能對抗管線階段的一部分低效率：氣泡的大小會以 $m$ 為因子縮減。

然而，和氣泡一樣惱人的，是儲存所有激活值所需的記憶體。我們必須把所有激活值保留在記憶體中，直到進入反向階段為止，這使得這類 PP 實作的記憶體迅速爆炸。我們能不能做得更好，避免這種記憶體爆炸？

既然記憶體爆炸的元凶是我們為反向傳播儲存的激活值，那就來看看能不能在其餘前向計算還在進行的同時，就開始執行反向傳播。這能讓我們儘早丟棄反向傳播所需的部分激活值。

## 一前一後（1F1B）與 Llama 3.1 的排程方案

這種排程稱為**一前一後（one-forward-one-backward, 1F1B）**，因為其中段/穩態是交替執行一次前向與一次反向傳播。整體想法就是儘早開始執行反向傳播。排程看起來像這樣：

![1F1B 排程](../webapp/assets/images/pp_1f1b.svg)

如果你仔細數一數，會發現氣泡的大小仍然相同，所以訓練效率並沒有明顯改善。不過，我們現在只需要儲存 $p$ 個微批次的激活值（$p$ 是管線平行度），而不是 $m$ 個（$m$ 是微批次數量），這可以緩解我們在 AFAB 排程中遇到的激活值記憶體爆炸。於是我們就能增加更多微批次，而這反過來會真正縮小氣泡。

從上圖也能看出這種配置的一大複雜之處：前向與反向傳播不再是乾淨的循序執行，而是在裝置之間平行且交錯地進行。這意味著我們得在每個裝置上各自獨立地排程前向與反向之間的切換，而不是像平常那樣放在一個簡單、共用的中央訓練迴圈裡。

這也是實作管線平行通常需要對訓練程式碼與模型程式碼進行相當大規模改動的原因之一。

你同樣可以在 Picotron 中找到 1F1B 的完整實作：

> 👉 [Picotron 中的 1F1B PP 實作](https://github.com/huggingface/picotron/blob/0035cce0e04afd6192763b11efe50010d8ad0f71/picotron/pipeline_parallel/pipeline_parallel.py#L85-L145)（原文此處為可展開的程式碼區塊）

讓我們透過叢集上的一些基準測試，看看 1F1B 管線平行排程在實務上的擴展表現：

![不同微批次數量下管線平行的吞吐量擴展](../webapp/assets/images/pp_1f1b_scaling.png)
*不同微批次數量下管線平行的吞吐量擴展表現。*

左圖中，當微批次數量等於或小於 PP 度減一（$m = p - 1$）時，可以看到管線氣泡的危害有多大——效能低落，甚至隨著 PP 擴大而下滑。右圖則顯示，使用遠多於 PP 度的微批次數（$m = 32 \gg p - 1$）有助於改善低 PP 度時的效能，但在非常大的 PP 度下仍然受限。實務上，我們不可能為了維持 $m \gg p - 1$ 的比例而無限制地增加微批次數量，因為終究會受到目標全域批次大小的限制。當 PP 度不斷增加、微批次數已達可能的最大值時，我們最終只能按照 $r_{bubble} = \frac{p - 1}{m}$ 承受更大的氣泡。

有趣的是，在微批次數量較少時，從單一節點（$p = 8$）擴展到兩個節點（$p = 16$）效能只下降 14%——遠優於張量平行，後者在類似的跨節點情境中通常會有約 43% 的效能衰退。這種在碰上低頻寬節點間網路時的表現，使管線平行在跨多節點的分散式訓練中格外有吸引力。

雖然 1F1B 顯著減少了激活值的記憶體佔用，但從最後這張圖可以看出，管線氣泡仍是效率的主要瓶頸。氣泡大小依舊正比於管線階段數，讓寶貴的 GPU 算力閒置。我們能否設計出更聰明的排程，把這些浪費的計算時間降到最低呢？

## 交錯階段（Interleaving Stages）

1F1B 排程改善了記憶體使用，卻沒有讓閒置氣泡的大小改善多少。有沒有什麼辦法能把這條戰線再往前推？

事實證明，只要我們願意引入一些額外的通訊操作，這是可能的。是時候談談**交錯階段（interleaved stages）**了。

到目前為止，我們都是沿著模型深度方向天真地切分模型，例如把第 1–4 層放在第一顆 GPU、第 5–8 層放在第二顆 GPU。但其實還有其他切分方式可以考慮，例如把奇數層（1、3、5、7）放在第一顆 GPU、偶數層（2、4、6、8）放在第二顆 GPU。

整體來說，這可以看成一種「環狀管線」（looping pipeline）：微批次在模型的前向傳播過程中，會繞著圈子從一顆 GPU 移動到下一顆。讓我們用圖來看看它是怎麼運作的：

![交錯式管線平行](../webapp/assets/images/pp_1f1b_interleaved.svg)
*交錯式管線平行的範例：模型的層分散在 4 顆 GPU 上。數字仍然對應微批次編號，但為了清楚起見，我們把模型最前面與最後面的層塗上不同顏色，以呈現層在各 GPU 之間的分佈方式。*

於是我們會看到額外的通訊發生，因為同樣的計算，模型現在要經過每顆 GPU 好幾次，而先前只需一趟。不過，每次前向與反向傳播的時間都除以了 $v$（$v$ 是每顆 GPU 上的階段數或模型分塊數），因為我們能把前向與反向傳播交錯得更好：

$$
\begin{aligned}
&t_{pb} = \frac{(p-1)*(t_f+t_b)}{v} \\
&r_{bubble} = \frac{1}{v}\frac{(p-1)*(t_f+t_b)}{m*(t_f+t_b)} = \frac{p-1}{v*m}
\end{aligned}
$$

所以我們現在既能靠增加微批次、也能靠交錯階段來縮小氣泡。但要注意，就數量而言，通訊量也會隨之增加 $v$ 倍，所以這是一種取捨。下圖中你可以看到 $p=8$ 的 PP 配置下的多種組合：其中 $m=1, v=1$ 的特例對應天真的管線平行，$v=1$ 的組合是 AFAB 或 1F1B 配置，而 $v \neq 1$ 則是交錯式配置。

> 🔬 原文此處為互動圖表（$p=8$ 時不同微批次數 $m$ 與交錯階段數 $v$ 組合下的氣泡大小比較），可至[原網頁](https://huggingface.co/spaces/nanotron/ultrascale-playbook)體驗；下圖為靜態版本。

![不同 PP 配置下的氣泡大小](../webapp/assets/images/pp_bubblesize.png)

這裡的排程也變得更複雜，因為我們必須在特定 GPU 上、特定時刻決定優先處理哪一邊：是讓較早的微批次優先通過較後面的層——意即儘快關閉前向與反向的迴圈（所謂「深度優先」（depth-first），即優先讓批次儘快離開模型）——還是優先讓較晚的微批次通過較前面的層（所謂「廣度優先」（breadth-first），即優先把管線儘量填滿）。這個選擇在很棒的「Breadth-First Pipeline Parallelism」論文中有詳細說明。

現在你已經具備了理解 Llama 3.1 管線平行做法的所有要素：它採用一前一後（1F1B）搭配交錯階段的配置，且優先序可以在深度優先與廣度優先之間調整。

![Llama 3.1 的管線排程](../webapp/assets/images/pp_llama3.1_schedule.png)

然而，可能的管線排程到這裡還沒有走到盡頭。最近有一些方法被提出來，能把**氣泡減少到幾乎為零**！這些技術就曾用於 DeepSeek V3/R1 的實作中。勾起你的好奇心了嗎？在離開管線平行的世界之前，讓我們最後快速看一眼這些神奇的排程！

## 零氣泡（Zero Bubble）與 DualPipe

最近有人提出了更精巧的氣泡縮減方法，達到了接近「零氣泡」（zero bubble）的境界。祕訣在於把相關運算拆解到更細的粒度，以便用最有效率的方式將它們交錯排入。例如 DeepSeek V3/R1 的管線實作方法 DualPipe，就達到了接近零氣泡的狀態。

> 📝 **註**：DeepSeek V3 技術報告中的終極「炫技」：作者指出他們的配置「達成了近乎為零的 all-to-all 通訊開銷」。

讓我們藉由概述 ZeroBubble 這項 DualPipe 的前驅研究，簡單看看這是怎麼辦到的。ZeroBubble 的基本觀察是：矩陣乘法的反向傳播其實包含兩個彼此分離的運算——對輸入的反向運算（$B$），以及對權重的反向運算（$W$）：

其中，$B$（對輸入的反向傳播）的輸出是執行下層反向傳播所必需的，但 $W$（對權重的反向傳播）對反向傳播的其餘部分並非必要，一般而言只需要在優化器更新步驟之前完成即可。我們可以在下圖中看到這一點：

![ZeroBubble 對反向傳播的細粒度拆解計算圖](../webapp/assets/images/pp_zerobubble_compgraph.png)

這代表 $W$ 可以彈性地排在同一階段對應的 $B$ 之後的任何位置，讓我們得以策略性地擺放 $W$ 來填補管線氣泡。右上方的 ZB-H2 排程就是利用這種細粒度拆解達成零氣泡的（理論）排程範例。

![ZeroBubble 排程比較](../webapp/assets/images/pp_zerobubble_ppschedule.png)
*上方（ZeroBubble 論文的圖 2）：經典的 1F1B 排程，前向與反向傳播交錯執行，但反向傳播仍維持粗粒度的整體。下方兩張圖（ZeroBubble 論文的圖 3）：ZeroBubble 排程的兩種變體，把反向運算拆成「B」與「W」兩個更細粒度的運算。最後一種名為「ZB-H2」的排程，就是利用這種細粒度拆解達成零氣泡的（理論）排程範例。*

DeepSeek 的 DualPipe 隨其 V3 技術報告一同發表，將這種拆解式做法進一步延伸到「兩條資料流從 PP 維度的兩端同時傳入」的情境，並將這兩條資料流交錯排程，把 GPU 的閒置時間壓得更低。下方的排程圖展示了這種排程，它比先前那些都還要複雜：

![DualPipe 排程](../webapp/assets/images/pp_zerobubble_dualpipe.png)

一般而言，要充分優化這類複雜的排程，需要仔細量測各種細粒度運算的耗時，並求解一個整數線性規劃（ILP）問題來最小化最終的氣泡時間。關於執行這類排程所用的啟發式方法與演算法，可參閱 ZeroBubble 論文中的討論。總之，ZeroBubble 與 DualPipe 的排程過於複雜，我們無法在此提供程式碼片段，但你應該已經對其中涉及的概念有了大致的認識。

我們在管線排程與氣泡世界的巡禮到此告一段落。希望你喜歡這趟導覽！

現在，是時候轉向最後一種我們將詳細介紹、可用來高效訓練大型模型的平行化方法了：**專家平行**（expert parallelism）。
